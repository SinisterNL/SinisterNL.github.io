<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinisterNL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Bodoni Moda SC', Georgia, serif;
    }

    /* ── Hamburger ── */
    .hamburger {
      position: fixed; top: 1.4rem; left: 1.4rem;
      z-index: 1001; cursor: pointer;
      display: flex; flex-direction: column; gap: 6px;
      padding: 6px; background: none; border: none;
    }
    .hamburger span {
      display: block; width: 22px; height: 1px;
      background: #D4AF37;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Nav panel ── */
    .nav-panel {
      position: fixed; top: 0; left: 0;
      height: 100%; width: 220px;
      background: #0d0d0d; border-right: 1px solid #1e1e1e;
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000; padding: 5rem 2rem 2rem;
      display: flex; flex-direction: column; gap: 2.2rem;
    }
    .nav-panel.open { transform: translateX(0); }
    .nav-panel a {
      color: #D4AF37; text-decoration: none;
      font-size: 1rem; letter-spacing: 0.25em;
      text-transform: uppercase; transition: opacity 0.2s;
    }
    .nav-panel a:hover { opacity: 0.6; }

    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 999;
      opacity: 0; pointer-events: none; transition: opacity 0.35s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── Header ── */
    header {
      padding: 3rem 2rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .instagram-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #D4AF37;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .instagram-link:hover { opacity: 0.6; }
    .instagram-link svg {
      width: 28px; height: 28px;
      fill: none;
      stroke: #D4AF37;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    header h1 {
      font-size: 4.5rem; font-weight: 400;
      letter-spacing: 0.3em; text-transform: uppercase; color: #ccc;
    }

    /* ── Feed ── */
    main {
      max-width: 820px; margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
      display: flex; flex-direction: column; align-items: center;
    }

    article { width: 100%; display: flex; flex-direction: column; gap: 0; }
    article img { width: 100%; display: block; border-radius: 2px; }

    /* ── Horizontal gold rule ── */
    .photo-rule {
      width: 100%; height: 1px; margin: 1rem 0;
      background: linear-gradient(
        to right, transparent 0%, #C9A84C 15%, #D4AF37 50%, #C9A84C 85%, transparent 100%
      );
    }

    /* ── Text post ── */
    .text-post {
      display: flex; justify-content: space-between;
      align-items: baseline; gap: 1rem; padding: 1.5rem 0;
    }
    .text-post-left { display: flex; flex-direction: column; gap: 0.5rem; }
    .post-label { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: #555; }
    .post-link {
      font-size: 1.05rem; font-weight: 400; color: #D4AF37;
      text-decoration: none; letter-spacing: 0.05em; transition: opacity 0.2s;
    }
    .post-link:hover { opacity: 0.7; }

    /* ── Meta row ── */
    .meta { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
    .caption { font-size: 1.05rem; font-weight: 400; color: #ddd; line-height: 1.6; }
    .date { font-size: 0.8rem; color: #555; white-space: nowrap; letter-spacing: 0.05em; }

    /* ── Vertical gold divider ── */
    .divider { display: flex; justify-content: center; align-items: center; padding: 2.5rem 0; width: 100%; }
    .divider-line {
      width: 1px; height: 192px;
      background: linear-gradient(
        to bottom, transparent 0%, #C9A84C 18%, #D4AF37 50%, #C9A84C 82%, transparent 100%
      );
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 2rem 1.2rem 1.6rem; gap: 0.7rem; }
      header h1 { font-size: 2.6rem; letter-spacing: 0.2em; }
      main { padding: 2.5rem 1rem 4rem; }
      .text-post { flex-wrap: wrap; }
      .text-post .date { width: 100%; text-align: left; }
      .divider { padding: 1.8rem 0; }
      .divider-line { height: 120px; }
      .meta { flex-wrap: wrap; gap: 0.4rem; }
      .meta .date { width: 100%; }
    }

    /* ── Photo hover background ── */
    #photo-bg {
      position: fixed; inset: 0;
      background-size: 200%; background-position: center; background-repeat: no-repeat;
      opacity: 0; pointer-events: none;
      z-index: 1;
      transition: opacity 0.4s ease;
    }
    #photo-bg.active { opacity: 0.5; }

    header { position: relative; z-index: 2; }
    main   { position: relative; z-index: 2; }
  </style>
</head>
<body>

  <div id="photo-bg"></div>

  <button class="hamburger" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="overlay" id="overlay"></div>
  <nav class="nav-panel" id="navPanel">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
  </nav>

  <header>
    <!-- Instagram logo -->
    <a href="https://www.instagram.com/sinisternl/" target="_blank" rel="noopener" class="instagram-link" aria-label="Instagram">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="#D4AF37" stroke="none"/>
      </svg>
    </a>
    <h1>SinisterNL</h1>
  </header>

  <main>

    <!-- POST 1 — Boodschappen update -->
    <article id="post-1">
      <div class="text-post">
        <div class="text-post-left">
          <span class="post-label">Project Update</span>
          <a href="projects.html" class="post-link">Boodschappen grafiek bijgewerkt &rarr;</a>
        </div>
        <span class="date">11 Apr 2026</span>
      </div>
    </article>

    <div class="divider">
      <div class="divider-line" data-id="d1" data-next="post-2"></div>
    </div>

    <!-- POST 2 — Beach photo -->
    <article id="post-2">
      <img src="images/beach.jpg" alt="Playa Forti">
      <div class="photo-rule"></div>
      <div class="meta">
        <p class="caption">A day at Playa Forti.</p>
        <span class="date">3 Apr 2026</span>
      </div>
    </article>

    <div class="divider">
      <div class="divider-line" data-id="d2" data-next="post-3"></div>
    </div>

    <!-- POST 3 — Coastline photo -->
    <article id="post-3">
      <img src="images/coastline.jpg" alt="Dark clouds over the coastline">
      <div class="photo-rule"></div>
      <div class="meta">
        <p class="caption">Facing the dark clouds.</p>
        <span class="date">30 Mar 2026</span>
      </div>
    </article>

    <div class="divider">
      <div class="divider-line" data-id="d3" data-next="post-4"></div>
    </div>

    <!-- POST 4 — Food photo -->
    <article id="post-4">
      <img src="images/food.jpg" alt="Lunch">
      <div class="photo-rule"></div>
      <div class="meta">
        <p class="caption">Lunch.</p>
        <span class="date">20 Nov 2024</span>
      </div>
    </article>

  </main>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const navPanel = document.getElementById('navPanel');
    const overlay  = document.getElementById('overlay');
    function toggleMenu() {
      const open = navPanel.classList.toggle('open');
      menuBtn.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
    }
    menuBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);

    const cooldown = new Set();
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const id = entry.target.dataset.id;
        if (entry.intersectionRatio >= 1 && !cooldown.has(id)) {
          cooldown.add(id);
          const next = document.getElementById(entry.target.dataset.next);
          if (next) next.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => cooldown.delete(id), 1500);
        }
      });
    }, { threshold: 1.0 });
    document.querySelectorAll('.divider-line').forEach(l => observer.observe(l));

    // Photo hover background effect (pointer devices only)
    if (window.matchMedia('(hover: hover)').matches) {
      const photoBg = document.getElementById('photo-bg');
      document.querySelectorAll('article img').forEach(img => {
        img.addEventListener('mouseenter', () => {
          photoBg.style.backgroundImage = `url('${img.src}')`;
          photoBg.classList.add('active');
        });
        img.addEventListener('mouseleave', () => {
          photoBg.classList.remove('active');
        });
      });
    }
  </script>
</body>
</html>
