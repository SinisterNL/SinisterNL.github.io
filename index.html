<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinisterNL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Bodoni Moda SC', Georgia, serif;
    }

    /* ── Hamburger button ── */
    .hamburger {
      position: fixed;
      top: 1.4rem;
      left: 1.4rem;
      z-index: 1001;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: #D4AF37;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Slide-out nav ── */
    .nav-panel {
      position: fixed;
      top: 0; left: 0;
      height: 100%;
      width: 220px;
      background: #0d0d0d;
      border-right: 1px solid #1e1e1e;
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      padding: 5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
    }
    .nav-panel.open { transform: translateX(0); }

    .nav-panel a {
      color: #D4AF37;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .nav-panel a:hover { opacity: 0.6; }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── Header ── */
    header {
      padding: 4rem 2rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid #222;
    }
    header h1 {
      font-size: 4.5rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #ccc;
    }

    /* ── Content ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    article {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    article img {
      width: 100%;
      display: block;
      border-radius: 2px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }
    .caption { font-size: 1.05rem; font-weight: 400; color: #ddd; line-height: 1.6; }
    .date { font-size: 0.8rem; color: #555; white-space: nowrap; letter-spacing: 0.05em; }

    /* ── Gold divider ── */
    .divider {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2.5rem 0;
      width: 100%;
    }
    .divider-line {
      width: 1px;
      height: 192px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        #C9A84C 18%,
        #D4AF37 50%,
        #C9A84C 82%,
        transparent 100%
      );
    }
  </style>
</head>
<body>

  <button class="hamburger" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <div class="overlay" id="overlay"></div>

  <nav class="nav-panel" id="navPanel">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
  </nav>

  <header><h1>SinisterNL</h1></header>

  <main>
    <article id="photo-1">
      <img src="images/beach.jpg" alt="Playa Forti">
      <div class="meta">
        <p class="caption">A day at Playa Forti.</p>
        <span class="date">3 Apr 2026</span>
      </div>
    </article>

    <div class="divider">
      <div class="divider-line" data-id="d1" data-next="photo-2"></div>
    </div>

    <article id="photo-2">
      <img src="images/coastline.jpg" alt="Dark clouds over the coastline">
      <div class="meta">
        <p class="caption">Facing the dark clouds.</p>
        <span class="date">30 Mar 2026</span>
      </div>
    </article>

    <div class="divider">
      <div class="divider-line" data-id="d2" data-next="photo-3"></div>
    </div>

    <article id="photo-3">
      <img src="images/food.jpg" alt="Lunch">
      <div class="meta">
        <p class="caption">Lunch.</p>
        <span class="date">20 Nov 2024</span>
      </div>
    </article>
  </main>

  <script>
    // ── Nav toggle ──
    const menuBtn = document.getElementById('menuBtn');
    const navPanel = document.getElementById('navPanel');
    const overlay  = document.getElementById('overlay');

    function toggleMenu() {
      const open = navPanel.classList.toggle('open');
      menuBtn.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
    }
    menuBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);

    // ── Scroll snap on gold divider ──
    const cooldown = new Set();
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const id = entry.target.dataset.id;
        if (entry.intersectionRatio >= 1 && !cooldown.has(id)) {
          cooldown.add(id);
          const next = document.getElementById(entry.target.dataset.next);
          if (next) next.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => cooldown.delete(id), 1500);
        }
      });
    }, { threshold: 1.0 });

    document.querySelectorAll('.divider-line').forEach(l => observer.observe(l));
  </script>
</body>
</html>
