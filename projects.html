<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — SinisterNL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Bodoni Moda SC', Georgia, serif;
    }

    /* ── Hamburger ── */
    .hamburger {
      position: fixed;
      top: 1.4rem; left: 1.4rem;
      z-index: 1001; cursor: pointer;
      display: flex; flex-direction: column; gap: 6px;
      padding: 6px; background: none; border: none;
    }
    .hamburger span {
      display: block; width: 22px; height: 1px;
      background: #D4AF37;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Nav panel ── */
    .nav-panel {
      position: fixed; top: 0; left: 0;
      height: 100%; width: 220px;
      background: #0d0d0d; border-right: 1px solid #1e1e1e;
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000; padding: 5rem 2rem 2rem;
      display: flex; flex-direction: column; gap: 2.2rem;
    }
    .nav-panel.open { transform: translateX(0); }
    .nav-panel a {
      color: #D4AF37; text-decoration: none;
      font-size: 1rem; letter-spacing: 0.25em;
      text-transform: uppercase; transition: opacity 0.2s;
    }
    .nav-panel a:hover { opacity: 0.6; }

    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 999;
      opacity: 0; pointer-events: none; transition: opacity 0.35s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── Header ── */
    header {
      padding: 4rem 2rem 2.5rem;
      text-align: center; border-bottom: 1px solid #222;
    }
    header h1 {
      font-size: 4.5rem; font-weight: 400;
      letter-spacing: 0.3em; text-transform: uppercase; color: #ccc;
    }
    header p.subtitle {
      margin-top: 0.6rem; font-size: 0.78rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: #777;
    }

    /* ── Main ── */
    main {
      max-width: 820px; margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
      display: flex; flex-direction: column; gap: 3rem;
    }

    /* ── Project card ── */
    .project-card {
      display: flex; flex-direction: column; gap: 1.2rem;
      border: 1px solid #1e1e1e; border-radius: 4px;
      padding: 2rem; transition: border-color 0.2s;
    }
    .project-card:hover { border-color: #2e2e2e; }

    .project-header {
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 1px solid #1e1e1e; padding-bottom: 1rem;
    }
    .project-title {
      font-size: 1.6rem; font-weight: 400;
      letter-spacing: 0.15em; text-transform: uppercase; color: #D4AF37;
    }
    .project-tag {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: #777;
    }

    .project-desc {
      font-size: 0.95rem; color: #aaa;
      line-height: 1.8; letter-spacing: 0.03em;
    }

    /* ── Open button ── */
    .open-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      align-self: flex-start; padding: 0.6rem 1.4rem;
      border: 1px solid #D4AF37; border-radius: 2px;
      color: #D4AF37; text-decoration: none;
      font-family: 'Bodoni Moda SC', serif; font-size: 0.78rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .open-btn:hover { background: #D4AF37; color: #111; }
    .open-btn svg { width: 12px; height: 12px; fill: currentColor; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 2.5rem 1.2rem 1.8rem; }
      header h1 { font-size: 2.6rem; letter-spacing: 0.2em; }
      main { padding: 2.5rem 1rem 4rem; gap: 2rem; }
      .project-card { padding: 1.4rem; }
      .project-header { flex-direction: column; gap: 0.5rem; }
      .project-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <button class="hamburger" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="overlay" id="overlay"></div>
  <nav class="nav-panel" id="navPanel">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
  </nav>

  <header>
    <h1>Projects</h1>
    <p class="subtitle">SinisterNL</p>
  </header>

  <main>
    <div class="project-card">
      <div class="project-header">
        <h2 class="project-title">Boodschappen</h2>
        <span class="project-tag">Prijsanalyse &middot; Cura&ccedil;ao</span>
      </div>
      <p class="project-desc">
        Interactieve prijsgrafiek van supermarkten op Cura&ccedil;ao. Vergelijk producten per winkel,
        bekijk prijstrends over tijd en filter op categorie &mdash; Mangusa, Goisco en Centrum.
      </p>
      <a href="boodschappen.html" class="open-btn">
        <svg viewBox="0 0 16 16"><path d="M8 1l7 7-7 7-1.4-1.4L11.2 9H1V7h10.2L6.6 2.4z"/></svg>
        Open grafiek
      </a>
    </div>
  </main>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const navPanel = document.getElementById('navPanel');
    const overlay  = document.getElementById('overlay');
    function toggleMenu() {
      const open = navPanel.classList.toggle('open');
      menuBtn.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
    }
    menuBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
  </script>
</body>
</html>
