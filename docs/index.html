<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinisterNL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: Georgia, serif; }
    header { padding: 3rem 2rem 1.5rem; text-align: center; border-bottom: 1px solid #222; }
    header h1 { font-size: 1.6rem; font-weight: normal; letter-spacing: 0.15em; text-transform: uppercase; color: #ccc; }
    main { max-width: 820px; margin: 0 auto; padding: 3rem 1.5rem 5rem; display: flex; flex-direction: column; gap: 5rem; }
    article { display: flex; flex-direction: column; gap: 1rem; }
    article img { width: 100%; display: block; border-radius: 2px; }
    .meta { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
    .caption { font-size: 1.05rem; color: #ddd; line-height: 1.6; }
    .date { font-size: 0.8rem; color: #555; white-space: nowrap; font-family: monospace; }
  </style>
</head>
<body>
  <header><h1>SinisterNL</h1></header>
  <main>
    <article>
      <img src="images/beach.jpg" alt="Playa Forti">
      <div class="meta">
        <p class="caption">A day at Playa Forti.</p>
        <span class="date">3 Apr 2026</span>
      </div>
    </article>
    <article>
      <img src="images/coastline.jpg" alt="Dark clouds over the coastline">
      <div class="meta">
        <p class="caption">Facing the dark clouds.</p>
        <span class="date">30 Mar 2026</span>
      </div>
    </article>
    <article>
      <img src="images/food.jpg" alt="Lunch">
      <div class="meta">
        <p class="caption">Lunch.</p>
        <span class="date">20 Nov 2024</span>
      </div>
    </article>
  </main>
</body>
</html>
